services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./shared:/app/shared:z
      - ./api:/app/api:z
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    restart: always

  worker-python:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.worker.python
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_STRATEGY=local
      - QUEUE_NAME=jobs_queue_python
    volumes:
      - ./shared:/app/shared:z
      - ./worker:/app/worker:z
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
          pids: 100
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; exit(0 if os.path.exists('/tmp/worker_heartbeat') and time.time() - os.path.getmtime('/tmp/worker_heartbeat') < 15 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  worker-cpp:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.worker.cpp
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_STRATEGY=local
      - QUEUE_NAME=jobs_queue_cpp
    volumes:
      - ./shared:/app/shared:z
      - ./worker:/app/worker:z
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
          pids: 100
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; exit(0 if os.path.exists('/tmp/worker_heartbeat') and time.time() - os.path.getmtime('/tmp/worker_heartbeat') < 15 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  redis_data:
