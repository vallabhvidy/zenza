services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.api
    ports:
      - "${API_PORT_EXTERNAL:-8000}:8000"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    volumes:
      - ./shared:/app/shared:z
      - ./api:/app/api:z
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT_EXTERNAL:-5173}:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-localhost}
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    restart: always

  worker-python:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.worker.python
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - WORKER_STRATEGY=${WORKER_STRATEGY:-local}
      - QUEUE_NAME=${QUEUE_NAME_PYTHON:-jobs_queue_python}
      - WORKER_TIMEOUT=${WORKER_TIMEOUT:-10}
    volumes:
      - ./shared:/app/shared:z
      - ./worker:/app/worker:z
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '${WORKER_CPU_LIMIT:-1.0}'
          memory: ${WORKER_MEMORY_LIMIT:-256M}
          pids: ${WORKER_PIDS_LIMIT:-100}
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; exit(0 if os.path.exists('/tmp/worker_heartbeat') and time.time() - os.path.getmtime('/tmp/worker_heartbeat') < 15 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  worker-cpp:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.worker.cpp
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - WORKER_STRATEGY=${WORKER_STRATEGY:-local}
      - QUEUE_NAME=${QUEUE_NAME_CPP:-jobs_queue_cpp}
      - WORKER_TIMEOUT=${WORKER_TIMEOUT:-10}
    volumes:
      - ./shared:/app/shared:z
      - ./worker:/app/worker:z
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '${WORKER_CPU_LIMIT:-1.0}'
          memory: ${WORKER_MEMORY_LIMIT:-256M}
          pids: ${WORKER_PIDS_LIMIT:-100}
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; exit(0 if os.path.exists('/tmp/worker_heartbeat') and time.time() - os.path.getmtime('/tmp/worker_heartbeat') < 15 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  redis_data:
